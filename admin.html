<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — De Prezzo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1D33;--navy-mid:#122945;--gold:#C9A84C;--gold-light:#E8D48B;
  --cream:#F7F4ED;--white:#fff;--text-dark:#1A1A2E;--text-mid:#4A4A5A;
  --text-light:#7A7A8A;--teal:#1A6B5A;--red:#C44D4D;--green:#3D8B5E;
  --shadow:0 2px 12px rgba(11,29,51,0.08);--radius:12px;
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}

/* ─── LOGIN ─── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--white);padding:48px;border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:400px;text-align:center}
.login-card h1{font-size:1.6rem;color:var(--navy);margin-bottom:8px}
.login-card p{color:var(--text-light);font-size:.9rem;margin-bottom:32px}
.login-card input{width:100%;padding:14px 18px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:.95rem;margin-bottom:16px;outline:none;transition:border .2s}
.login-card input:focus{border-color:var(--gold)}
.login-card button{width:100%;padding:14px;border:none;border-radius:50px;background:var(--navy);color:var(--white);font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
.login-card button:hover{background:var(--gold)}
.login-error{color:var(--red);font-size:.85rem;margin-top:12px;display:none}

/* ─── DASHBOARD ─── */
.dashboard{display:none}
.topbar{background:var(--navy);color:var(--white);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:1.2rem}
.topbar-right{display:flex;align-items:center;gap:16px}
.btn-logout{background:rgba(255,255,255,0.1);color:var(--white);border:none;padding:8px 20px;border-radius:50px;font-family:inherit;font-size:.85rem;cursor:pointer;transition:background .2s}
.btn-logout:hover{background:rgba(255,255,255,0.2)}

.main{max-width:1200px;margin:0 auto;padding:24px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);text-align:center}
.stat-card .num{font-family:'DM Serif Display',serif;font-size:2.4rem;color:var(--navy);display:block}
.stat-card .lbl{color:var(--text-light);font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.stat-card.highlight .num{color:var(--gold)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--white);border-radius:50px;padding:4px;box-shadow:var(--shadow);width:fit-content}
.tab{padding:10px 28px;border-radius:50px;border:none;background:none;font-family:inherit;font-size:.9rem;font-weight:500;color:var(--text-light);cursor:pointer;transition:all .2s}
.tab.active{background:var(--navy);color:var(--white)}

/* Table */
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-header{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.table-header h3{font-size:1.1rem;color:var(--navy)}
.table-count{color:var(--text-light);font-size:.85rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);background:#fafafa;border-bottom:1px solid #f0f0f0}
td{padding:14px 16px;font-size:.88rem;border-bottom:1px solid #f5f5f5;color:var(--text-mid)}
tr:hover{background:#fafaf8}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-nuovo{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-letto{background:rgba(74,74,90,0.1);color:var(--text-mid)}
.badge-contattato{background:rgba(61,139,94,0.12);color:var(--green)}
.badge-archiviato{background:rgba(196,77,77,0.1);color:var(--red)}

select.stato-select{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-family:inherit;font-size:.82rem;cursor:pointer;outline:none}
select.stato-select:focus{border-color:var(--gold)}

.email-link{color:var(--navy);font-weight:500}
.msg-preview{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-light);font-size:.82rem}
.date-cell{font-size:.82rem;color:var(--text-light);white-space:nowrap}

.empty-state{padding:60px;text-align:center;color:var(--text-light)}
.empty-state .icon{font-size:3rem;margin-bottom:16px;opacity:.4}

.refresh-btn{background:var(--cream);border:1px solid #ddd;padding:8px 16px;border-radius:8px;font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .2s}
.refresh-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.08)}

/* Responsive */
@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr}
  .topbar{padding:12px 16px}
  .main{padding:16px}
  table{font-size:.8rem}
  th,td{padding:10px 8px}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;padding:10px 12px;font-size:.82rem}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>🔒 Area Admin</h1>
    <p>Dott.ssa Chiara De Prezzo — Pannello di controllo</p>
    <input type="password" id="adminKey" placeholder="Chiave di accesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Accedi</button>
    <div class="login-error" id="loginError">Chiave non valida</div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="dashboard" id="dashboard">

  <div class="topbar">
    <h2>📊 Dashboard — De Prezzo</h2>
    <div class="topbar-right">
      <span id="lastRefresh" style="font-size:.8rem;opacity:.5"></span>
      <button class="btn-logout" onclick="doLogout()">Esci</button>
    </div>
  </div>

  <div class="main">

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card highlight"><span class="num" id="statNuovi">—</span><span class="lbl">Nuovi da leggere</span></div>
      <div class="stat-card"><span class="num" id="statContatti">—</span><span class="lbl">Contatti totali</span></div>
      <div class="stat-card"><span class="num" id="statNewsletter">—</span><span class="lbl">Iscritti newsletter</span></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('contatti')">Contatti</button>
      <button class="tab" onclick="switchTab('newsletter')">Newsletter</button>
    </div>

    <!-- Contatti Table -->
    <div id="contattiSection">
      <div class="table-wrap">
        <div class="table-header">
          <h3>Richieste di contatto</h3>
          <button class="refresh-btn" onclick="loadAll()">⟳ Aggiorna</button>
        </div>
        <div id="contattiTable"></div>
      </div>
    </div>

    <!-- Newsletter Table -->
    <div id="newsletterSection" style="display:none">
      <div class="table-wrap">
        <div class="table-header">
          <h3>Iscritti alla newsletter</h3>
          <button class="refresh-btn" onclick="loadAll()">⟳ Aggiorna</button>
        </div>
        <div id="newsletterTable"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'https://myracescalendar-f2cca256b4b9.herokuapp.com/api/deprezzo';
let KEY = '';

// ─── AUTH ────────
function doLogin() {
  KEY = document.getElementById('adminKey').value.trim();
  if (!KEY) return;

  fetch(`${API}/stats`, { headers: { 'x-admin-key': KEY } })
    .then(r => {
      if (!r.ok) throw new Error('unauthorized');
      return r.json();
    })
    .then(() => {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      sessionStorage.setItem('dp_key', KEY);
      loadAll();
    })
    .catch(() => {
      const el = document.getElementById('loginError');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    });
}

function doLogout() {
  KEY = '';
  sessionStorage.removeItem('dp_key');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminKey').value = '';
}

// Auto-login
(function() {
  const saved = sessionStorage.getItem('dp_key');
  if (saved) {
    KEY = saved;
    document.getElementById('adminKey').value = saved;
    doLogin();
  }
})();

// ─── TABS ────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('contattiSection').style.display = tab === 'contatti' ? 'block' : 'none';
  document.getElementById('newsletterSection').style.display = tab === 'newsletter' ? 'block' : 'none';
}

// ─── LOAD DATA ───
async function loadAll() {
  await Promise.all([loadStats(), loadContatti(), loadNewsletter()]);
  document.getElementById('lastRefresh').textContent = 'Aggiornato: ' + new Date().toLocaleTimeString('it-IT');
}

async function apiGet(endpoint) {
  const res = await fetch(`${API}${endpoint}`, { headers: { 'x-admin-key': KEY } });
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function loadStats() {
  try {
    const { data } = await apiGet('/stats');
    document.getElementById('statNuovi').textContent = data.nuovi;
    document.getElementById('statContatti').textContent = data.totalContatti;
    document.getElementById('statNewsletter').textContent = data.totalNewsletter;
  } catch (e) {
    console.error('Stats error:', e);
  }
}

async function loadContatti() {
  try {
    const { data } = await apiGet('/contatti');
    const el = document.getElementById('contattiTable');

    if (!data.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📭</div>Nessun contatto ancora</div>';
      return;
    }

    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Data</th><th>Nome</th><th>Email</th><th>Azienda</th><th>Servizio</th><th>Messaggio</th><th>Stato</th>
        </tr></thead>
        <tbody>${data.map(c => `
          <tr>
            <td class="date-cell">${formatDate(c.createdAt)}</td>
            <td><strong>${c.nome} ${c.cognome}</strong>${c.telefono ? '<br><span style="font-size:.78rem;color:var(--text-light)">'+c.telefono+'</span>' : ''}</td>
            <td><a href="mailto:${c.email}" class="email-link">${c.email}</a></td>
            <td>${c.azienda}</td>
            <td style="font-size:.82rem">${c.servizio || '—'}</td>
            <td><div class="msg-preview" title="${escHtml(c.messaggio)}">${c.messaggio || '—'}</div></td>
            <td>
              <select class="stato-select" onchange="updateStato('${c._id}', this.value)">
                ${['nuovo','letto','contattato','archiviato'].map(s =>
                  `<option value="${s}" ${c.stato===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`
                ).join('')}
              </select>
            </td>
          </tr>
        `).join('')}</tbody>
      </table>`;
  } catch (e) {
    console.error('Contatti error:', e);
  }
}

async function loadNewsletter() {
  try {
    const { data } = await apiGet('/newsletter/subscribers');
    const el = document.getElementById('newsletterTable');

    if (!data.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📧</div>Nessun iscritto ancora</div>';
      return;
    }

    el.innerHTML = `
      <table>
        <thead><tr><th>Data iscrizione</th><th>Email</th><th>Fonte</th></tr></thead>
        <tbody>${data.map(s => `
          <tr>
            <td class="date-cell">${formatDate(s.createdAt)}</td>
            <td><a href="mailto:${s.email}" class="email-link">${s.email}</a></td>
            <td style="font-size:.82rem">${s.fonte || 'sito-web'}</td>
          </tr>
        `).join('')}</tbody>
      </table>`;
  } catch (e) {
    console.error('Newsletter error:', e);
  }
}

// ─── UPDATE STATO ──
async function updateStato(id, stato) {
  try {
    await fetch(`${API}/contatti/${id}/stato`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': KEY },
      body: JSON.stringify({ stato }),
    });
    loadStats(); // refresh counts
  } catch (e) {
    console.error('Update error:', e);
    alert('Errore aggiornamento stato');
  }
}

// ─── UTILS ───────
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
